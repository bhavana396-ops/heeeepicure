<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hepicure — Home</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-shell">

  <!-- SIDE PANEL -->
  <aside class="side-panel">
    <div class="brand">
      <span class="tiffin-mark on-dark"></span>
      <span class="brand-name">Hepicure</span>
    </div>
    <div class="brand-tag">The Food Boutique</div>

    <nav>
      <a class="nav-item active" href="home.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
        <span>Home</span>
      </a>
      <a class="nav-item" href="subscription.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
        <span>Subscription</span>
      </a>
      <a class="nav-item" href="track-order.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
        <span>Track order</span>
      </a>
    </nav>

    <div class="user-chip" id="user-chip">
      <img id="user-photo" src="https://api.dicebear.com/7.x/shapes/svg?seed=hepicure" alt="">
      <div>
        <div class="name" id="user-name">—</div>
        <button class="signout" onclick="hepicureSignOut()">Sign out</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <!-- STICKY TOP BAR: search + cart, always visible while scrolling -->
    <div class="sticky-top">
      <div class="control-row">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="search-input" placeholder="Search dishes — e.g. paneer, idli, poha…">
        </div>
        <button class="cart-icon-btn" onclick="hepicureToggleCartDrawer(true)" aria-label="View cart">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-icon-badge" id="cart-icon-badge">0</span>
        </button>
      </div>
    </div>

    <div class="main-header">
      <div>
        <h1 id="greeting">Hungry?</h1>
        <div class="greet-sub">Curated tiffin menus, delivered on your schedule.</div>
      </div>
    </div>

    <!-- BROWSE SECTIONS: hidden while actively searching, so results take over the whole view -->
    <div id="browse-sections">
      <div class="section-title" style="margin-top:8px;">
        <span class="eyebrow">Boutique catalog</span>
        <h2>Tiffin services</h2>
      </div>
      <div class="tiffin-row" id="tiffin-row"></div>

      <div class="tabs" id="tabs"></div>

      <div id="bestseller-section">
        <div class="section-title" id="bestseller-title">
          <span class="eyebrow">Most ordered</span>
          <h2>Best sellers</h2>
        </div>
        <div class="bestseller-row" id="bestseller-row"></div>
      </div>
    </div>

    <div class="section-title">
      <span class="eyebrow" id="menu-eyebrow">Menu</span>
      <h2 id="menu-title">All dishes</h2>
    </div>
    <div class="menu-grid" id="menu-grid"></div>
  </main>

  <!-- CART BAR (appears once something is added) -->
  <div class="cart-bar" id="cart-bar" onclick="hepicureToggleCartDrawer(true)">
    <div class="cart-info">
      <span id="cart-count">0 items</span>
      <span class="cart-total" id="cart-total">₹0</span>
    </div>
    <button class="cart-checkout-btn" onclick="event.stopPropagation(); hepicureCheckoutWhatsApp()">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17.6 6.3A8.4 8.4 0 0 0 4 16.9L3 21l4.2-1.1a8.4 8.4 0 0 0 12.4-7.4 8.4 8.4 0 0 0-2-6.2Zm-5.6 13a7 7 0 0 1-3.6-1l-.3-.2-2.6.7.7-2.5-.2-.3a7 7 0 1 1 6 3.3Zm3.8-5.2c-.2-.1-1.2-.6-1.4-.7-.2-.1-.3-.1-.5.1s-.6.7-.7.8-.3.2-.5.1a5.7 5.7 0 0 1-1.7-1 6.3 6.3 0 0 1-1.2-1.5c-.1-.2 0-.3.1-.4l.3-.4.2-.3v-.3c0-.1-.5-1.2-.7-1.6-.2-.4-.4-.4-.5-.4h-.4a.9.9 0 0 0-.6.3 2.6 2.6 0 0 0-.8 1.9c0 1.1.8 2.2.9 2.3.1.2 1.6 2.5 3.9 3.4a13 13 0 0 0 1.3.5c.6.2 1 .1 1.4.1.4-.1 1.2-.5 1.4-1 .2-.4.2-.8.1-.9-.1-.1-.2-.2-.4-.3Z"/></svg>
      <span>Order on WhatsApp</span>
    </button>
  </div>

  <!-- CART DRAWER (itemized view, opens when cart bar is tapped) -->
  <div class="cart-drawer-overlay" id="cart-drawer-overlay" onclick="hepicureToggleCartDrawer(false)"></div>
  <div class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header">
      <h3>Your order</h3>
      <button class="cart-drawer-close" onclick="hepicureToggleCartDrawer(false)">✕</button>
    </div>
    <div class="cart-drawer-list" id="cart-drawer-list"></div>
    <div class="cart-drawer-footer">
      <div class="cart-drawer-total">
        <span>Total</span>
        <span id="cart-drawer-total-amt">₹0</span>
      </div>
      <button class="cart-checkout-btn" style="width:100%;justify-content:center;" onclick="hepicureCheckoutWhatsApp()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M17.6 6.3A8.4 8.4 0 0 0 4 16.9L3 21l4.2-1.1a8.4 8.4 0 0 0 12.4-7.4 8.4 8.4 0 0 0-2-6.2Zm-5.6 13a7 7 0 0 1-3.6-1l-.3-.2-2.6.7.7-2.5-.2-.3a7 7 0 1 1 6 3.3Zm3.8-5.2c-.2-.1-1.2-.6-1.4-.7-.2-.1-.3-.1-.5.1s-.6.7-.7.8-.3.2-.5.1a5.7 5.7 0 0 1-1.7-1 6.3 6.3 0 0 1-1.2-1.5c-.1-.2 0-.3.1-.4l.3-.4.2-.3v-.3c0-.1-.5-1.2-.7-1.6-.2-.4-.4-.4-.5-.4h-.4a.9.9 0 0 0-.6.3 2.6 2.6 0 0 0-.8 1.9c0 1.1.8 2.2.9 2.3.1.2 1.6 2.5 3.9 3.4a13 13 0 0 0 1.3.5c.6.2 1 .1 1.4.1.4-.1 1.2-.5 1.4-1 .2-.4.2-.8.1-.9-.1-.1-.2-.2-.4-.3Z"/></svg>
        <span>Order on WhatsApp</span>
      </button>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-config.js"></script>
<script src="js/auth.js"></script>
<script src="js/menu-data.js"></script>
<script src="js/home.js"></script>
</body>
</html>
